# This workflow will build a Java project with Maven and publish it to Maven Central Repository
# ref: https://github.com/actions/setup-java/blob/v3.11.0/docs/advanced-usage.md#Publishing-using-Apache-Maven

# Secrets required:
# - MAVEN_USERNAME: Username for Maven Central Repository
# - MAVEN_CENTRAL_TOKEN: Token/password for Maven Central Repository
# - MAVEN_GPG_PRIVATE_KEY: GPG private key to sign the artifacts (string)
# - MAVEN_GPG_PASSPHRASE: Passphrase for the GPG private key

name: Publish library to Maven Central Repository

on:
  release:
    types: [created]
    secrets:
      MAVEN_USERNAME:
        required: true
      MAVEN_CENTRAL_TOKEN:
        required: true
      MAVEN_GPG_PRIVATE_KEY:
        required: true
      MAVEN_GPG_PASSPHRASE:
        required: true
  workflow_dispatch: ~

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install just
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP:-/tmp}/just-bin"
          mkdir -p "$install_dir"
          # Resolve the latest release tag via the github.com redirect to avoid
          # api.github.com rate limits on shared runner egress IPs.
          latest_url=$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/casey/just/releases/latest)
          just_version="${latest_url##*/tag/}"
          case "$RUNNER_OS" in
            Windows) asset="just-${just_version}-x86_64-pc-windows-msvc.zip" ;;
            macOS)   asset="just-${just_version}-x86_64-apple-darwin.tar.gz" ;;
            *)       asset="just-${just_version}-x86_64-unknown-linux-musl.tar.gz" ;;
          esac
          curl -fL "https://github.com/casey/just/releases/download/${just_version}/${asset}" -o "$install_dir/$asset"
          case "$asset" in
            *.zip) unzip -o "$install_dir/$asset" -d "$install_dir" ;;
            *)     tar -xzf "$install_dir/$asset" -C "$install_dir" ;;
          esac
          echo "$install_dir" >> "$GITHUB_PATH"
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25' # Always use the most recent LTS JDK for building
          server-id: 'ossrh'
          # define environmental variable names
          server-username: MAVEN_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}

      - name: Clean, build and publish to Apache Maven Central
        run: just install-styleguide publish pass=${{ secrets.MAVEN_GPG_PASSPHRASE }}
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Upload output files to release
        uses: AButler/upload-release-assets@v3.0.1
        with:
          files: 'target/*.jar;target/*.pom;target/*.asc'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
